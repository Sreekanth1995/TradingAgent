<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Agent | Admin Dashboard v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-strong: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #00f2fe;
            --accent-glow: rgba(0, 242, 254, 0.3);
            --success: #22c55e;
            --danger: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e293b, var(--bg));
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        .dashboard-container {
            width: 100%;
            max-width: 900px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .connect-btn {
            background: rgba(0, 242, 254, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent-glow);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .connect-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        /* AUTH BAR */
        .auth-bar { margin-bottom: 32px; }
        .auth-bar input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px;
            color: #fff;
            font-size: 13px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .auth-bar input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* MONITOR CARD */
        .monitor-card {
            background: var(--glass-strong);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }

        .monitor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .monitor-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
        }

        .live-badge {
            font-size: 10px;
            font-weight: 800;
            padding: 4px 10px;
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
            border-radius: 20px;
            border: 1px solid rgba(34, 197, 94, 0.3);
            display: none;
            animation: pulse-light 2s infinite;
        }

        @keyframes pulse-light {
            0% { opacity: 0.5; } 50% { opacity: 1; text-shadow: 0 0 10px var(--success); } 100% { opacity: 0.5; }
        }

        .monitor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .monitor-item label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
        .monitor-value { font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 700; }
        
        #val-trend.CALL { color: var(--success); }
        #val-trend.PUT { color: var(--danger); }
        
        .monitor-symbol {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px dashed var(--glass-border);
            font-size: 12px;
            color: var(--text-secondary);
            font-family: monospace;
            text-align: center;
        }

        /* COMMAND SECTORS */
        .command-center { display: flex; flex-direction: column; gap: 20px; margin-bottom: 32px; }
        .command-sector {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
        }
        .sector-title { font-size: 11px; font-weight: 700; color: var(--text-secondary); margin-bottom: 14px; text-transform: uppercase; }
        
        .btn-group { display: flex; gap: 12px; }
        .indicator-box { position: relative; flex: 2; }
        
        .btn {
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .btn-buy-call { background: rgba(34, 197, 94, 0.1); color: var(--success); border: 1px solid rgba(34, 197, 94, 0.3); }
        .btn-buy-call:hover { background: var(--success); color: #000; box-shadow: 0 0 25px rgba(34, 197, 94, 0.3); }
        
        .btn-buy-put { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-buy-put:hover { background: var(--danger); color: #000; box-shadow: 0 0 25px rgba(239, 68, 68, 0.3); }

        .btn-exit { flex: 1; background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid var(--glass-border); }
        .btn-exit:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-1px); }

        /* BUBBLE INDICATOR */
        .pos-active-label {
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 800;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: rgba(34, 197, 94, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(34, 197, 94, 0.2);
            display: none;
            white-space: nowrap;
            animation: label-glow 2s infinite;
            z-index: 10;
        }

        @keyframes label-glow {
            0% { opacity: 0.6; box-shadow: 0 0 5px rgba(34, 197, 94, 0.1); }
            50% { opacity: 1; box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
            100% { opacity: 0.6; box-shadow: 0 0 5px rgba(34, 197, 94, 0.1); }
        }

        /* EMERGENCY */
        .emergency-btn {
            background: linear-gradient(135deg, #ef4444 0%, #7f1d1d 100%);
            color: #fff;
            padding: 20px;
            font-size: 15px;
            font-weight: 800;
            border-radius: 18px;
            border: none;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(239, 68, 68, 0.3);
            transition: all 0.3s ease;
        }
        .emergency-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
            box-shadow: 0 15px 50px rgba(239, 68, 68, 0.5);
        }

        /* STATUS MESSAGES */
        #status-msg {
            margin-top: 24px;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
            display: none;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .msg-success { background: rgba(34, 197, 94, 0.1); color: var(--success); border: 1px solid rgba(34, 197, 94, 0.2); }
        .msg-error { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }

        /* AI SECTIONS */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 800px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .side-card {
            background: var(--glass-strong);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .side-card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* PRICE LEVELS */
        .level-row {
            display: grid;
            grid-template-columns: 60px 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }
        .level-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); }
        .level-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px;
            color: #fff;
            font-size: 12px;
            width: 100%;
            text-align: center;
        }
        .level-input:focus { outline: none; border-color: var(--accent); }
        
        .add-level-btn {
            background: transparent;
            border: 1px dashed var(--glass-border);
            color: var(--text-secondary);
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            margin: 8px 0 16px 0;
            transition: all 0.2s;
        }
        .add-level-btn:hover { border-color: var(--accent); color: var(--accent); }

        .save-btn {
            background: rgba(0, 242, 254, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent-glow);
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        .save-btn:hover { background: var(--accent); color: #000; }

        /* AI CONTEXT */
        .context-area {
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-size: 12px;
            font-family: monospace;
            resize: vertical;
            margin-bottom: 12px;
        }
        .context-area:focus { outline: none; border-color: var(--accent); }

        /* AI LOGS */
        .ai-log-list {
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
        }
        .ai-log-item {
            padding: 8px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .ai-log-item:last-child { border-bottom: none; }
        .log-allow { color: var(--success); }
        .log-reject { color: var(--danger); }
        .log-reason { color: var(--text-secondary); }

        .footer { margin-top: 40px; text-align: center; font-size: 11px; color: var(--text-secondary); letter-spacing: 0.05em; }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <header class="header">
            <div>
                <h1>Trading Agent</h1>
                <p>NIFTY Live Control Hub v2.0</p>
            </div>
            <button id="btn-connect-dhan" class="connect-btn" onclick="authConnect()" aria-label="Connect Dhan broker account" data-action="connect-dhan">Connect Dhan</button>
        </header>

        <section class="auth-bar" aria-label="Authentication">
            <input type="password" id="secret" name="webhook-secret" placeholder="Enter Webhook Secret to Enable Controls" aria-label="Webhook Secret" autocomplete="current-password">
        </section>

        <div class="dashboard-grid">
            <!-- Left Column: Controls -->
            <div class="col-controls">
                <section id="position-radar" class="monitor-card" aria-label="Position Status" role="status">
                    <div class="monitor-header">
                        <span class="monitor-label">Position Radar</span>
                        <span id="badge-live" class="live-badge" aria-live="polite">● LIVE</span>
                    </div>
                    <div class="monitor-grid">
                        <div class="monitor-item">
                            <label for="val-trend">Current Trend</label>
                            <div id="val-trend" class="monitor-value" data-field="current-trend" aria-live="polite">IDLE</div>
                        </div>
                        <div class="monitor-item">
                            <label for="val-qty">Open Quantity</label>
                            <div id="val-qty" class="monitor-value" data-field="open-quantity" aria-live="polite">0</div>
                        </div>
                    </div>
                    <div id="val-symbol" class="monitor-symbol" data-field="active-symbol">System Standby • No active orders</div>
                </section>

                <section id="command-center" class="command-center" aria-label="NIFTY Trade Controls">
                    <!-- CALL SECTOR -->
                    <div id="sector-call" class="command-sector" data-sector="CALL" aria-label="NIFTY CALL CE Controls">
                        <div class="sector-title">NIFTY CALL (CE)</div>
                        <div class="btn-group">
                            <div class="indicator-box">
                                <div id="stat-CALL" class="pos-active-label" aria-live="polite" data-status="call-active">CALL POSITION ACTIVE</div>
                                <button id="btn-buy-call" class="btn btn-buy-call" onclick="agentAPI.sendUIAction('CALL')" data-action="buy-call" aria-label="Buy NIFTY Call option">BUY CALL</button>
                            </div>
                            <button id="btn-exit-call" class="btn btn-exit" onclick="agentAPI.sendUIAction('EXIT_CALL')" data-action="exit-call" aria-label="Exit NIFTY Call position">EXIT</button>
                        </div>
                    </div>

                    <!-- PUT SECTOR -->
                    <div id="sector-put" class="command-sector" data-sector="PUT" aria-label="NIFTY PUT PE Controls">
                        <div class="sector-title">NIFTY PUT (PE)</div>
                        <div class="btn-group">
                            <div class="indicator-box">
                                <div id="stat-PUT" class="pos-active-label" aria-live="polite" data-status="put-active">PUT POSITION ACTIVE</div>
                                <button id="btn-buy-put" class="btn btn-buy-put" onclick="agentAPI.sendUIAction('PUT')" data-action="buy-put" aria-label="Buy NIFTY Put option">BUY PUT</button>
                            </div>
                            <button id="btn-exit-put" class="btn btn-exit" onclick="agentAPI.sendUIAction('EXIT_PUT')" data-action="exit-put" aria-label="Exit NIFTY Put position">EXIT</button>
                        </div>
                    </div>
                </section>

                <button id="btn-exit-all" class="emergency-btn" onclick="agentAPI.emergencyExit()" data-action="exit-all" aria-label="Emergency exit all positions and reset">
                    🚨 EXIT ALL POSITIONS &amp; RESET RANKS
                </button>
            </div>

            <!-- Right Column: AI & Levels -->
            <div class="col-ai">
                <!-- PRICE LEVELS STUDIO -->
                <section class="side-card">
                    <div class="side-card-title">Price Levels Studio</div>
                    
                    <button class="add-level-btn" onclick="addLevelRow('UTP')" style="margin-bottom: 8px;">+ Add Upper Level (UTP)</button>
                    <div id="utp-container"></div>
                    
                    <div class="level-row" style="margin-top: 8px; margin-bottom: 8px;">
                        <span class="level-label">TP0 Base</span>
                        <input type="number" id="tp0-low" class="level-input" placeholder="Low">
                        <input type="number" id="tp0-high" class="level-input" placeholder="High">
                    </div>
                    
                    <div id="ltp-container"></div>
                    <button class="add-level-btn" onclick="addLevelRow('LTP')" style="margin-top: 8px;">+ Add Lower Level (LTP)</button>

                    <button class="save-btn" onclick="saveLevels()">Save Levels</button>
                </section>

                <!-- AI STRATEGY CONTEXT -->
                <section class="side-card">
                    <div class="side-card-title">AI Strategy Context</div>
                    <textarea id="ai-context" class="context-area" placeholder="Enter system prompt / strategy context for OpenAI signal analysis..."></textarea>
                    <button class="save-btn" onclick="saveContext()">Save Context</button>
                </section>

                <!-- AI DECISION LOG -->
                <section class="side-card">
                    <div class="side-card-title">
                        AI Decision Log
                        <button style="background:none;border:none;color:var(--text-secondary);cursor:pointer;" onclick="refreshAILogs()">↻</button>
                    </div>
                    <div id="ai-logs" class="ai-log-list">
                        <div class="ai-log-item" style="color: var(--text-secondary); text-align: center;">No logs yet.</div>
                    </div>
                </section>
            </div>
        </div>

        <div id="status-msg" role="alert" aria-live="assertive"></div>

        <footer class="footer">
            Precision Trading v2.1 • OpenAI Enhanced
        </footer>
    </div>

    <script>
        // Initialization & Polling
        window.onload = () => {
            const savedSecret = localStorage.getItem('agent_secret');
            if (savedSecret) {
                document.getElementById('secret').value = savedSecret;
                refreshState();
                loadLevels();
                loadContext();
                refreshAILogs();
            }
            setInterval(refreshState, 5000);
            setInterval(refreshAILogs, 10000);
            
            // Handle Auth Success Redirect
            const params = new URLSearchParams(window.location.search);
            if (params.get('auth_status') === 'success') {
                notify('✅ Secure connection established!', 'success');
                window.history.replaceState({}, document.title, "/");
            }
        };

        async function refreshState() {
            const secret = document.getElementById('secret').value.trim();
            if (!secret) return;

            localStorage.setItem('agent_secret', secret);

            try {
                const response = await fetch('/get-state', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret, underlying: 'NIFTY' })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    updateUI(data.state);
                }
            } catch (err) { console.error('State Sync Failed', err); }
        }

        function updateUI(state) {
            const trend = state.side || 'IDLE';
            const qty = state.quantity || 0;
            const symbol = state.symbol || 'System Standby • No active orders';

            const trendEl = document.getElementById('val-trend');
            trendEl.textContent = trend;
            trendEl.className = 'monitor-value ' + (trend !== 'IDLE' ? trend : '');
            
            document.getElementById('val-qty').textContent = qty;
            document.getElementById('val-symbol').textContent = symbol;
            
            // Live Status Badge
            document.getElementById('badge-live').style.display = trend !== 'IDLE' ? 'inline-block' : 'none';

            // Active Position Labels
            document.getElementById('stat-CALL').style.display = trend === 'CALL' ? 'block' : 'none';
            document.getElementById('stat-PUT').style.display = trend === 'PUT' ? 'block' : 'none';
        }

        async function sendUIAction(action, skipConfirm = false) {
            const secret = document.getElementById('secret').value.trim();
            if (!secret) return notify('⚠️ Webhook secret required', 'error');

            if (!skipConfirm && !confirm(`Trigger ${action} for NIFTY?`)) return;

            notify(`🚀 Messaging Broker: ${action}...`, 'success');
            try {
                const response = await fetch('/ui-signal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret, underlying: 'NIFTY', action: action, quantity: 1 })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    notify(`✅ Success: ${action} executed`, 'success');
                    refreshState();
                } else {
                    notify(`❌ Failed: ${result.message || 'Unknown error'}`, 'error');
                }
            } catch (err) { notify('❌ Connection error to backend', 'error'); }
        }

        async function emergencyExit(skipConfirm = false) {
            const secret = document.getElementById('secret').value.trim();
            if (!secret) return notify('⚠️ Webhook secret required', 'error');

            if (!skipConfirm && !confirm("🚨 ATTENTION: This will close ALL Dhan positions and reset state. Proceed?")) return;

            notify('🚨 Triggering emergency square-off...', 'success');
            try {
                const response = await fetch('/manual-exit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    notify('✅ ALL POSITIONS CLEARED', 'success');
                    refreshState();
                }
            } catch (err) { notify('❌ Critical error in emergency signal!', 'error'); }
        }

        async function authConnect() {
            const secret = document.getElementById('secret').value.trim();
            if (!secret) return notify('⚠️ Webhook secret required to initiate auth', 'error');

            notify('🔗 Preparing Dhan Login...', 'success');
            try {
                const response = await fetch('/auth/initiate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret })
                });
                const result = await response.json();
                if (response.ok && result.url) window.location.href = result.url;
                else notify(`❌ Auth failed: ${result.message}`, 'error');
            } catch (err) { notify('❌ Backend unreachable', 'error'); }
        }

        function notify(msg, type) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.className = 'msg-' + type;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        // --- AI INTEGRATION LOGIC ---

        let utpCount = 0;
        let ltpCount = 0;

        function addLevelRow(type, low = '', high = '') {
            const container = document.getElementById(`${type.toLowerCase()}-container`);
            const count = type === 'UTP' ? ++utpCount : ++ltpCount;
            const name = `${type}${count}`;
            
            const div = document.createElement('div');
            div.className = 'level-row';
            div.id = `row-${name}`;
            div.innerHTML = `
                <span class="level-label">${name}</span>
                <input type="number" id="${name}-low" class="level-input" placeholder="Low" value="${low}">
                <input type="number" id="${name}-high" class="level-input" placeholder="High" value="${high}">
            `;
            
            if (type === 'UTP') {
                container.prepend(div);
            } else {
                container.appendChild(div);
            }
            return name;
        }

        async function loadLevels() {
            const secret = document.getElementById('secret').value.trim();
            if (!secret) return;
            try {
                const res = await fetch('/get-levels', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({secret})
                });
                const data = await res.json();
                if (data.status === 'success' && data.levels) {
                    const l = data.levels;
                    if (l.TP0) {
                        document.getElementById('tp0-low').value = l.TP0.low || '';
                        document.getElementById('tp0-high').value = l.TP0.high || '';
                    }
                    
                    document.getElementById('utp-container').innerHTML = '';
                    utpCount = 0;
                    Object.keys(l).filter(k => k.startsWith('UTP')).sort().forEach(k => {
                        addLevelRow('UTP', l[k].low, l[k].high);
                    });
                    
                    document.getElementById('ltp-container').innerHTML = '';
                    ltpCount = 0;
                    Object.keys(l).filter(k => k.startsWith('LTP')).sort().forEach(k => {
                        addLevelRow('LTP', l[k].low, l[k].high);
                    });
                }
            } catch (err) { console.error('Failed to load levels', err); }
        }

        async function saveLevels() {
            const secret = document.getElementById('secret').value.trim();
            if (!secret) return notify('Secret required', 'error');

            const levels = {};
            const tp0Low = document.getElementById('tp0-low').value;
            const tp0High = document.getElementById('tp0-high').value;
            if (tp0Low || tp0High) levels.TP0 = { low: parseFloat(tp0Low), high: parseFloat(tp0High) };

            for (let i = 1; i <= utpCount; i++) {
                const l = document.getElementById(`UTP${i}-low`)?.value;
                const h = document.getElementById(`UTP${i}-high`)?.value;
                if (l || h) levels[`UTP${i}`] = { low: parseFloat(l), high: parseFloat(h) };
            }
            for (let i = 1; i <= ltpCount; i++) {
                const l = document.getElementById(`LTP${i}-low`)?.value;
                const h = document.getElementById(`LTP${i}-high`)?.value;
                if (l || h) levels[`LTP${i}`] = { low: parseFloat(l), high: parseFloat(h) };
            }

            try {
                const res = await fetch('/set-levels', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({secret, levels})
                });
                const data = await res.json();
                if (data.status === 'success') notify('Levels Saved Successfully', 'success');
                else notify(data.message, 'error');
            } catch (err) { notify('Failed to save levels', 'error'); }
        }

        async function loadContext() {
            const secret = document.getElementById('secret').value.trim();
            if (!secret) return;
            try {
                const res = await fetch('/get-context', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({secret})
                });
                const data = await res.json();
                if (data.status === 'success') document.getElementById('ai-context').value = data.context || '';
            } catch (err) {}
        }

        async function saveContext() {
            const secret = document.getElementById('secret').value.trim();
            if (!secret) return notify('Secret required', 'error');
            const context = document.getElementById('ai-context').value;
            try {
                const res = await fetch('/set-context', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({secret, context})
                });
                const data = await res.json();
                if (data.status === 'success') notify('Context Saved Successfully', 'success');
                else notify(data.message, 'error');
            } catch (err) { notify('Failed to save context', 'error'); }
        }

        async function refreshAILogs() {
            const secret = document.getElementById('secret').value.trim();
            if (!secret) return;
            try {
                const res = await fetch('/get-ai-logs', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({secret})
                });
                const data = await res.json();
                if (data.status === 'success' && data.logs) {
                    const list = document.getElementById('ai-logs');
                    if (data.logs.length === 0) {
                        list.innerHTML = `<div class="ai-log-item" style="color: var(--text-secondary); text-align: center;">No logs yet.</div>`;
                        return;
                    }
                    // Reverse to show newest first
                    list.innerHTML = data.logs.reverse().map(log => `
                        <div class="ai-log-item">
                            <div style="display:flex; justify-content:space-between;">
                                <strong>${log.underlying} - ${log.direction}</strong>
                                <span class="${log.decision === 'ALLOW' ? 'log-allow' : 'log-reject'}">${log.decision} (${log.confidence}%)</span>
                            </div>
                            <div class="log-reason">${log.reason}</div>
                        </div>
                    `).join('');
                }
            } catch (err) {}
        }


        /**
         * AI Agent API
         * ─────────────────────────────────────────────────────────────
         * AI agents can interact with the dashboard via this global object.
         * All actions bypass the confirm() dialog when called programmatically.
         *
         * Usage examples:
         *   window.agentAPI.setSecret('YOUR_SECRET')
         *   await window.agentAPI.sendUIAction('CALL')     // Buy NIFTY Call
         *   await window.agentAPI.sendUIAction('PUT')      // Buy NIFTY Put
         *   await window.agentAPI.sendUIAction('EXIT_CALL')
         *   await window.agentAPI.sendUIAction('EXIT_PUT')
         *   await window.agentAPI.emergencyExit()          // Exit all positions
         *   window.agentAPI.getState()                     // Get current UI state
         */
        window.agentAPI = {
            setSecret: (s) => { document.getElementById('secret').value = s; localStorage.setItem('agent_secret', s); },
            sendUIAction: (action) => sendUIAction(action, true),
            emergencyExit: () => emergencyExit(true),
            getState: () => ({
                trend: document.getElementById('val-trend').textContent,
                quantity: document.getElementById('val-qty').textContent,
                symbol: document.getElementById('val-symbol').textContent,
                callActive: document.getElementById('stat-CALL').style.display !== 'none',
                putActive: document.getElementById('stat-PUT').style.display !== 'none',
                statusMsg: document.getElementById('status-msg').textContent
            }),
            refresh: () => refreshState()
        };
    </script>
</body>
