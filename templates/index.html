<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingAgent | AI-Accessible Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(20, 20, 25, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --call: #22c55e;
            --put: #ef4444;
            --accent: #00f2fe;
            --panic: #ff0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Outfit', sans-serif; font-size: 32px; background: linear-gradient(to right, #fff, var(--text-dim)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .dashboard-grid { width: 100%; max-width: 600px; display: grid; gap: 24px; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .auth-section { margin-bottom: 24px; }
        input { width: 100%; padding: 14px; background: #000; border: 1px solid var(--border); border-radius: 12px; color: white; margin-top: 8px; }

        label { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .control-group { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }

        .btn {
            padding: 20px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn:active { transform: scale(0.98); }

        .btn-call { background: var(--call); color: #003311; }
        .btn-put { background: var(--put); color: #330000; }
        .btn-exit { background: transparent; border: 1px solid var(--border); color: var(--text); font-size: 12px; }
        .btn-exit:hover { background: rgba(255,255,255,0.05); }

        .btn-panic { grid-column: span 2; background: var(--panic); color: white; margin-top: 10px; box-shadow: 0 0 20px rgba(255,0,0,0.2); }

        #ai-status {
            margin-top: 30px;
            width: 100%;
            max-width: 600px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            color: #4ade80;
            min-height: 60px;
            overflow-y: auto;
        }

        .instrument-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>TradingAgent Dashboard</h1>
        <p style="color: var(--text-dim); font-size: 14px; margin-top: 8px;">Control Hub v2.0 (AI-Optimized)</p>
    </header>

    <main class="dashboard-grid">
        <section class="card auth-section">
            <label for="secret">Webhook Secret</label>
            <input type="password" id="secret" placeholder="••••••••" value="">
        </section>

        <section class="card" id="nifty-controls">
            <div class="instrument-title">NIFTY 50</div>
            <div class="control-group">
                <button id="btn-nifty-call" class="btn btn-call" onclick="sendSignal('CALL')">Enter CALL</button>
                <button id="btn-nifty-put" class="btn btn-put" onclick="sendSignal('PUT')">Enter PUT</button>
                <button id="btn-nifty-exit-call" class="btn btn-exit" onclick="sendSignal('EXIT_CALL')">Exit CALL</button>
                <button id="btn-nifty-exit-put" class="btn btn-exit" onclick="sendSignal('EXIT_PUT')">Exit PUT</button>
            </div>
        </section>

        <section class="card" id="global-actions">
            <div class="instrument-title">Global Controls</div>
            <div class="control-group">
                <button id="btn-exit-all" class="btn btn-panic" onclick="exitAll()">🚨 EXIT ALL POSITIONS & RESET</button>
            </div>
        </section>
    </main>

    <div id="ai-status">READY FOR COMMANDS...</div>

    <script>
        async function sendSignal(action) {
            const secret = document.getElementById('secret').value.trim();
            if (!secret) return updateStatus('ERROR: Missing Webhook Secret');

            updateStatus(`EXECUTING ${action} FOR NIFTY...`);
            
            try {
                const response = await fetch('/ui-signal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret, underlying: 'NIFTY', action })
                });
                const data = await response.json();
                updateStatus(`RESPONSE: ${JSON.stringify(data.result || data.message)}`);
            } catch (error) {
                updateStatus(`NETWORK ERROR: ${error.message}`);
            }
        }

        async function exitAll() {
            const secret = document.getElementById('secret').value.trim();
            if (!secret) return updateStatus('ERROR: Missing Webhook Secret');
            if (!confirm("EMERGENCY: Close all positions?")) return;

            updateStatus('TRIGGERING EMERGENCY EXIT ALL...');
            try {
                const response = await fetch('/manual-exit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret })
                });
                const data = await response.json();
                updateStatus(`RESPONSE: ${data.message}`);
            } catch (error) {
                updateStatus(`NETWORK ERROR: ${error.message}`);
            }
        }

        function updateStatus(msg) {
            const display = document.getElementById('ai-status');
            display.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            console.log(msg);
        }
    </script>
</body>
</html>
