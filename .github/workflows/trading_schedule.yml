name: Trading Hours Schedule

on:
  schedule:
    # 09:00 AM IST (03:30 AM UTC) - Start Service
    - cron: '30 3 * * 1-5'
    # 03:45 PM IST (10:15 AM UTC) - Stop Service
    - cron: '15 10 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  manage-service:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Action (Start/Stop)
        id: check_time
        run: |
          HOUR=$(date +%H)
          MINUTE=$(date +%M)
          # UTC 3:30 is Start
          if [ "$HOUR" -eq 3 ] && [ "$MINUTE" -ge 20 ] && [ "$MINUTE" -le 40 ]; then
            echo "ACTION=start" >> $GITHUB_OUTPUT
            echo "REPLICAS=1" >> $GITHUB_OUTPUT
          else
            echo "ACTION=stop" >> $GITHUB_OUTPUT
            echo "REPLICAS=0" >> $GITHUB_OUTPUT
          fi

      - name: Toggle Railway Service
        run: |
          echo "Executing ${{ steps.check_time.outputs.ACTION }} (Replicas: ${{ steps.check_time.outputs.REPLICAS }})"
          
          # Using legacy numReplicas for compatibility, or multiRegionConfig if needed
          # The mutation attempts to scale the service instance
          curl -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceUpdate(id: \"${{ secrets.RAILWAY_SERVICE_ID }}\", environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\", input: { numReplicas: ${{ steps.check_time.outputs.REPLICAS }} }) { id } }"
            }'
